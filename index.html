<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR Tetris - Quest 3</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #hud {
      position: fixed; top: 20px; left: 20px; z-index: 999;
      color: #0ff; font-family: 'Courier New', monospace; font-size: 18px;
      text-shadow: 0 0 10px #0ff; pointer-events: none;
    }
    #hud h2 { margin: 0 0 5px 0; font-size: 24px; }
    #controls-info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; color: #fff; font-family: 'Courier New', monospace;
      font-size: 14px; text-align: center; opacity: 0.7; pointer-events: none;
    }
    #game-over-screen {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%); z-index: 1000;
      color: #f00; font-family: 'Courier New', monospace;
      font-size: 48px; text-align: center; text-shadow: 0 0 20px #f00;
    }
    #game-over-screen .restart-hint { font-size: 18px; color: #fff; margin-top: 20px; }
  </style>
</head>
<body>

<div id="hud">
  <h2>VR TETRIS</h2>
  <div>Score: <span id="score">0</span></div>
  <div>Lines: <span id="lines">0</span></div>
  <div>Level: <span id="level">1</span></div>
</div>

<div id="controls-info">
  <b>Desktop:</b> Arrow Keys = Move | Z/X = Rotate | Space = Drop<br>
  <b>VR Controllers:</b> Thumbstick = Move | A/X = Rotate | Trigger = Drop
</div>

<div id="game-over-screen">
  GAME OVER
  <div class="restart-hint">Press R or Grip button to restart</div>
</div>

<a-scene vr-mode-ui="enabled: true" renderer="antialias: true; colorManagement: true" tetris-game>
  <a-sky color="#0a0a1a"></a-sky>
  <a-entity light="type: ambient; color: #446; intensity: 0.6"></a-entity>
  <a-entity light="type: directional; color: #fff; intensity: 0.8" position="1 3 2"></a-entity>

  <!-- Camera rig - in VR this becomes the headset position -->
  <a-entity id="rig" position="0 1.6 2">
    <a-camera wasd-controls-enabled="false" look-controls="pointerLockEnabled: false"></a-camera>
  </a-entity>

  <!-- VR Controllers -->
  <a-entity id="left-hand" hand-controls="hand: left; handModelStyle: lowPoly" vr-controls="hand: left"></a-entity>
  <a-entity id="right-hand" hand-controls="hand: right; handModelStyle: lowPoly" vr-controls="hand: right"></a-entity>

  <!-- Game container - everything is built via Three.js in the component -->
  <a-entity id="game-container" position="0 0.5 -1.5"></a-entity>

  <!-- VR HUD text - attached to game container so visible in VR -->
  <a-entity id="vr-hud" position="0 0.5 -1.5">
    <a-text id="vr-score" value="Score: 0" position="-1.6 2.5 0" color="#0ff" width="3" font="monoid"></a-text>
    <a-text id="vr-lines" value="Lines: 0" position="-1.6 2.3 0" color="#0ff" width="2.5" font="monoid"></a-text>
    <a-text id="vr-level" value="Level: 1" position="-1.6 2.1 0" color="#0ff" width="2.5" font="monoid"></a-text>
    <a-text value="NEXT" position="1.5 2.5 0" color="#fff" width="2" align="center" font="monoid"></a-text>
    <a-text id="vr-gameover" value="" position="0 1.5 0.3" color="#f00" width="6" align="center" font="monoid" visible="false"></a-text>
    <a-text id="vr-controls-text" value="Thumbstick: Move\nA/X: Rotate\nTrigger: Drop" position="0 -0.3 0" color="#888" width="2" align="center" font="monoid"></a-text>
  </a-entity>
</a-scene>

<script>
// ============================================================
// TETRIS GAME ENGINE
// ============================================================

const COLS = 10;
const ROWS = 20;
const BLOCK_SIZE = 0.15;
const BOARD_OFFSET_X = -(COLS * BLOCK_SIZE) / 2 + BLOCK_SIZE / 2;
const BOARD_OFFSET_Y = 0;

const PIECES = {
  I: { shape: [[0,0],[1,0],[2,0],[3,0]], color: 0x00ffff },
  O: { shape: [[0,0],[1,0],[0,1],[1,1]], color: 0xffff00 },
  T: { shape: [[0,0],[1,0],[2,0],[1,1]], color: 0xaa00ff },
  S: { shape: [[1,0],[2,0],[0,1],[1,1]], color: 0x00ff00 },
  Z: { shape: [[0,0],[1,0],[1,1],[2,1]], color: 0xff0000 },
  J: { shape: [[0,0],[0,1],[1,1],[2,1]], color: 0x0044ff },
  L: { shape: [[2,0],[0,1],[1,1],[2,1]], color: 0xff8800 }
};
const PIECE_KEYS = Object.keys(PIECES);

let board = [];
let currentPiece = null;
let currentX = 0, currentY = 0;
let currentRotation = [];
let nextPieceKey = null;
let score = 0, lines = 0, level = 1;
let gameOver = false;
let dropInterval = 1000;
let lastDrop = 0;

function initBoard() {
  board = [];
  for (let y = 0; y < ROWS; y++) {
    board[y] = Array(COLS).fill(null);
  }
}

function randomPiece() {
  return PIECE_KEYS[Math.floor(Math.random() * PIECE_KEYS.length)];
}

function rotateShape(shape) {
  const maxY = Math.max(...shape.map(b => b[1]));
  return shape.map(([x, y]) => [maxY - y, x]);
}

function collides(shape, offX, offY) {
  for (const [bx, by] of shape) {
    const nx = offX + bx, ny = offY + by;
    if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
    if (ny >= 0 && board[ny][nx]) return true;
  }
  return false;
}

function lockPiece() {
  const piece = PIECES[currentPiece];
  for (const [bx, by] of currentRotation) {
    const x = currentX + bx, y = currentY + by;
    if (y < 0) { triggerGameOver(); return; }
    board[y][x] = piece.color;
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let y = ROWS - 1; y >= 0; y--) {
    if (board[y].every(cell => cell !== null)) {
      board.splice(y, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++; y++;
    }
  }
  if (cleared > 0) {
    score += ([0, 100, 300, 500, 800][cleared] || 800) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 1000 - (level - 1) * 80);
    updateHUD();
  }
}

function spawnPiece() {
  currentPiece = nextPieceKey || randomPiece();
  nextPieceKey = randomPiece();
  currentRotation = [...PIECES[currentPiece].shape];
  currentX = Math.floor(COLS / 2) - 1;
  currentY = 0;
  if (collides(currentRotation, currentX, currentY)) triggerGameOver();
}

function triggerGameOver() {
  gameOver = true;
  document.getElementById('game-over-screen').style.display = 'block';
  const vrGO = document.getElementById('vr-gameover');
  if (vrGO) {
    vrGO.setAttribute('value', 'GAME OVER\nGrip to restart');
    vrGO.setAttribute('visible', true);
  }
}

function restartGame() {
  initBoard();
  score = 0; lines = 0; level = 1;
  dropInterval = 1000; gameOver = false;
  document.getElementById('game-over-screen').style.display = 'none';
  const vrGO = document.getElementById('vr-gameover');
  if (vrGO) vrGO.setAttribute('visible', false);
  updateHUD();
  spawnPiece();
}

function movePiece(dx, dy) {
  if (gameOver) return false;
  if (!collides(currentRotation, currentX + dx, currentY + dy)) {
    currentX += dx; currentY += dy; return true;
  }
  return false;
}

function rotatePiece(dir) {
  if (gameOver) return;
  let newShape = [...currentRotation];
  const rotations = dir > 0 ? 1 : 3;
  for (let i = 0; i < rotations; i++) newShape = rotateShape(newShape);
  for (const kickX of [0, -1, 1, -2, 2]) {
    if (!collides(newShape, currentX + kickX, currentY)) {
      currentRotation = newShape; currentX += kickX; return;
    }
  }
}

function hardDrop() {
  if (gameOver) return;
  while (!collides(currentRotation, currentX, currentY + 1)) { currentY++; score += 2; }
  updateHUD(); lockPiece();
}

function getGhostY() {
  let gy = currentY;
  while (!collides(currentRotation, currentX, gy + 1)) gy++;
  return gy;
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
  const vs = document.getElementById('vr-score');
  const vl = document.getElementById('vr-lines');
  const vlv = document.getElementById('vr-level');
  if (vs) vs.setAttribute('value', 'Score: ' + score);
  if (vl) vl.setAttribute('value', 'Lines: ' + lines);
  if (vlv) vlv.setAttribute('value', 'Level: ' + level);
}

// ============================================================
// THREE.JS DIRECT RENDERING (VR-safe, no DOM manipulation)
// ============================================================

AFRAME.registerComponent('tetris-game', {
  init: function () {
    const scene = this.el;
    const container = document.getElementById('game-container');

    // Wait for container to be ready
    const waitForContainer = () => {
      if (!container.object3D) {
        setTimeout(waitForContainer, 100);
        return;
      }
      this.setupGame(container.object3D);
    };

    scene.addEventListener('loaded', () => {
      waitForContainer();
    });
  },

  setupGame: function (parentObj) {
    const THREE = AFRAME.THREE;
    const blockGeo = new THREE.BoxGeometry(BLOCK_SIZE * 0.92, BLOCK_SIZE * 0.92, BLOCK_SIZE * 0.92);

    // --- Pre-allocate all meshes ---

    // Board blocks: ROWS * COLS meshes (max blocks on board)
    this.boardMeshes = [];
    for (let i = 0; i < ROWS * COLS; i++) {
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.3, roughness: 0.4 });
      const mesh = new THREE.Mesh(blockGeo, mat);
      mesh.visible = false;
      parentObj.add(mesh);
      this.boardMeshes.push(mesh);
    }

    // Current piece: 4 meshes
    this.currentMeshes = [];
    for (let i = 0; i < 4; i++) {
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.3, roughness: 0.4 });
      const mesh = new THREE.Mesh(blockGeo, mat);
      mesh.visible = false;
      parentObj.add(mesh);
      this.currentMeshes.push(mesh);
    }

    // Ghost piece: 4 meshes
    this.ghostMeshes = [];
    for (let i = 0; i < 4; i++) {
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.3, roughness: 0.4, transparent: true, opacity: 0.25 });
      const mesh = new THREE.Mesh(blockGeo, mat);
      mesh.visible = false;
      parentObj.add(mesh);
      this.ghostMeshes.push(mesh);
    }

    // Next piece: 4 meshes
    this.nextMeshes = [];
    const nextOffsetX = 1.5;
    const nextOffsetY = 1.8;
    for (let i = 0; i < 4; i++) {
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.3, roughness: 0.4 });
      const mesh = new THREE.Mesh(blockGeo, mat);
      mesh.visible = false;
      parentObj.add(mesh);
      this.nextMeshes.push(mesh);
    }
    this.nextOffsetX = nextOffsetX;
    this.nextOffsetY = nextOffsetY;

    // --- Build static frame using Three.js ---
    this.buildFrame(parentObj, THREE);

    // --- Build starfield ---
    this.buildStars(parentObj, THREE);

    // --- Start game ---
    initBoard();
    spawnPiece();
    updateHUD();
    this.gameReady = true;
  },

  buildFrame: function (parentObj, THREE) {
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x222244, metalness: 0.6, roughness: 0.2 });
    const boardW = COLS * BLOCK_SIZE;
    const boardH = ROWS * BLOCK_SIZE;
    const cx = BOARD_OFFSET_X + boardW / 2 - BLOCK_SIZE / 2;
    const cy = BOARD_OFFSET_Y + boardH / 2 - BLOCK_SIZE / 2;

    // Left wall
    const leftGeo = new THREE.BoxGeometry(BLOCK_SIZE * 0.3, boardH + BLOCK_SIZE * 0.3, BLOCK_SIZE);
    const left = new THREE.Mesh(leftGeo, frameMat);
    left.position.set(BOARD_OFFSET_X - BLOCK_SIZE * 0.65, cy, 0);
    parentObj.add(left);

    // Right wall
    const right = new THREE.Mesh(leftGeo, frameMat);
    right.position.set(BOARD_OFFSET_X + boardW - BLOCK_SIZE * 0.35, cy, 0);
    parentObj.add(right);

    // Bottom wall
    const bottomGeo = new THREE.BoxGeometry(boardW + BLOCK_SIZE * 0.6, BLOCK_SIZE * 0.3, BLOCK_SIZE);
    const bottom = new THREE.Mesh(bottomGeo, frameMat);
    bottom.position.set(cx, BOARD_OFFSET_Y - BLOCK_SIZE * 0.65, 0);
    parentObj.add(bottom);

    // Back panel
    const backMat = new THREE.MeshStandardMaterial({ color: 0x111122, transparent: true, opacity: 0.3, metalness: 0.8, roughness: 0.1 });
    const backGeo = new THREE.BoxGeometry(boardW, boardH, BLOCK_SIZE * 0.1);
    const back = new THREE.Mesh(backGeo, backMat);
    back.position.set(cx, cy, -BLOCK_SIZE * 0.55);
    parentObj.add(back);

    // Grid lines
    const gridMat = new THREE.MeshBasicMaterial({ color: 0x222233 });
    for (let x = 0; x <= COLS; x++) {
      const geo = new THREE.BoxGeometry(0.003, boardH, 0.001);
      const line = new THREE.Mesh(geo, gridMat);
      line.position.set(BOARD_OFFSET_X + x * BLOCK_SIZE - BLOCK_SIZE / 2, cy, -BLOCK_SIZE * 0.48);
      parentObj.add(line);
    }
    for (let y = 0; y <= ROWS; y++) {
      const geo = new THREE.BoxGeometry(boardW, 0.003, 0.001);
      const line = new THREE.Mesh(geo, gridMat);
      line.position.set(cx, BOARD_OFFSET_Y + y * BLOCK_SIZE - BLOCK_SIZE / 2, -BLOCK_SIZE * 0.48);
      parentObj.add(line);
    }
  },

  buildStars: function (parentObj, THREE) {
    const starGeo = new THREE.SphereGeometry(0.015, 4, 4);
    const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    for (let i = 0; i < 150; i++) {
      const star = new THREE.Mesh(starGeo, starMat);
      star.position.set(
        (Math.random() - 0.5) * 20,
        Math.random() * 10 - 2,
        -5 - Math.random() * 15
      );
      const s = 0.5 + Math.random() * 1.5;
      star.scale.set(s, s, s);
      parentObj.add(star);
    }
  },

  tick: function (time) {
    if (!this.gameReady) return;

    // Game tick - drop piece
    if (!gameOver) {
      if (time - lastDrop > dropInterval) {
        lastDrop = time;
        if (!movePiece(0, 1)) {
          lockPiece();
        }
      }
    }

    // --- Render board blocks ---
    let meshIdx = 0;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (board[y][x] !== null && meshIdx < this.boardMeshes.length) {
          const m = this.boardMeshes[meshIdx];
          m.position.set(
            BOARD_OFFSET_X + x * BLOCK_SIZE,
            BOARD_OFFSET_Y + (ROWS - 1 - y) * BLOCK_SIZE,
            0
          );
          m.material.color.setHex(board[y][x]);
          m.material.opacity = 1;
          m.material.transparent = false;
          m.visible = true;
          meshIdx++;
        }
      }
    }
    // Hide unused board meshes
    for (let i = meshIdx; i < this.boardMeshes.length; i++) {
      this.boardMeshes[i].visible = false;
    }

    // --- Render current piece ---
    if (currentPiece && !gameOver) {
      const piece = PIECES[currentPiece];
      for (let i = 0; i < 4; i++) {
        if (i < currentRotation.length) {
          const [bx, by] = currentRotation[i];
          const x = currentX + bx;
          const y = currentY + by;
          const m = this.currentMeshes[i];
          if (y >= 0) {
            m.position.set(
              BOARD_OFFSET_X + x * BLOCK_SIZE,
              BOARD_OFFSET_Y + (ROWS - 1 - y) * BLOCK_SIZE,
              0
            );
            m.material.color.setHex(piece.color);
            m.visible = true;
          } else {
            m.visible = false;
          }
        } else {
          this.currentMeshes[i].visible = false;
        }
      }

      // --- Render ghost piece ---
      const ghostY = getGhostY();
      for (let i = 0; i < 4; i++) {
        if (i < currentRotation.length) {
          const [bx, by] = currentRotation[i];
          const x = currentX + bx;
          const y = ghostY + by;
          const m = this.ghostMeshes[i];
          if (y >= 0) {
            m.position.set(
              BOARD_OFFSET_X + x * BLOCK_SIZE,
              BOARD_OFFSET_Y + (ROWS - 1 - y) * BLOCK_SIZE,
              0
            );
            m.material.color.setHex(piece.color);
            m.visible = true;
          } else {
            m.visible = false;
          }
        } else {
          this.ghostMeshes[i].visible = false;
        }
      }
    } else {
      for (let i = 0; i < 4; i++) {
        this.currentMeshes[i].visible = false;
        this.ghostMeshes[i].visible = false;
      }
    }

    // --- Render next piece ---
    if (nextPieceKey) {
      const np = PIECES[nextPieceKey];
      for (let i = 0; i < 4; i++) {
        if (i < np.shape.length) {
          const [bx, by] = np.shape[i];
          const m = this.nextMeshes[i];
          m.position.set(
            this.nextOffsetX + bx * BLOCK_SIZE - BLOCK_SIZE,
            this.nextOffsetY - by * BLOCK_SIZE + BLOCK_SIZE,
            0
          );
          m.material.color.setHex(np.color);
          m.visible = true;
        } else {
          this.nextMeshes[i].visible = false;
        }
      }
    }
  }
});

// ============================================================
// INPUT HANDLING
// ============================================================

const keyState = {};
const keyTimers = {};

document.addEventListener('keydown', (e) => {
  if (keyState[e.code]) return;
  keyState[e.code] = true;
  handleInput(e.code);
  if (['ArrowLeft', 'ArrowRight', 'ArrowDown'].includes(e.code)) {
    keyTimers[e.code] = setTimeout(() => {
      keyTimers[e.code + '_interval'] = setInterval(() => handleInput(e.code), 60);
    }, 170);
  }
});

document.addEventListener('keyup', (e) => {
  keyState[e.code] = false;
  clearTimeout(keyTimers[e.code]);
  clearInterval(keyTimers[e.code + '_interval']);
});

function handleInput(code) {
  switch(code) {
    case 'ArrowLeft': movePiece(-1, 0); break;
    case 'ArrowRight': movePiece(1, 0); break;
    case 'ArrowDown': movePiece(0, 1); score += 1; updateHUD(); break;
    case 'ArrowUp': rotatePiece(1); break;
    case 'KeyZ': rotatePiece(-1); break;
    case 'KeyX': rotatePiece(1); break;
    case 'Space': hardDrop(); break;
    case 'KeyR': if (gameOver) restartGame(); break;
  }
}

// VR Controller support
AFRAME.registerComponent('vr-controls', {
  schema: { hand: { type: 'string' } },
  init: function() {
    const el = this.el;
    this.thumbstickCooldown = 0;

    el.addEventListener('thumbstickmoved', (evt) => {
      const now = Date.now();
      if (now < this.thumbstickCooldown) return;
      if (evt.detail.x < -0.5) { movePiece(-1, 0); this.thumbstickCooldown = now + 150; }
      else if (evt.detail.x > 0.5) { movePiece(1, 0); this.thumbstickCooldown = now + 150; }
      if (evt.detail.y > 0.5) { movePiece(0, 1); score += 1; updateHUD(); this.thumbstickCooldown = now + 100; }
      else if (evt.detail.y < -0.5) { rotatePiece(1); this.thumbstickCooldown = now + 250; }
    });

    el.addEventListener('abuttondown', () => rotatePiece(1));
    el.addEventListener('xbuttondown', () => rotatePiece(-1));
    el.addEventListener('bbuttondown', () => rotatePiece(-1));
    el.addEventListener('ybuttondown', () => rotatePiece(1));
    el.addEventListener('triggerdown', () => hardDrop());
    el.addEventListener('gripdown', () => { if (gameOver) restartGame(); });
  }
});
</script>
</body>
</html>
